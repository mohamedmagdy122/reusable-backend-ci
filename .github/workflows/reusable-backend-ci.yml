name: Reusable Backend CI

on:
  workflow_call:
    inputs:
      dotnet-version:
        required: true
        type: string
      project-path:
        required: true
        type: string
      test-path:
        required: true
        type: string
      run-tests:
        required: false
        type: boolean
        default: true
      image-name:
        required: true
        type: string

jobs:

  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          dotnet-quality: preview

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore ${{ inputs.project-path }}

      - name: Build
        run: dotnet build ${{ inputs.project-path }} --no-restore -c Release

      - name: Run tests
        if: ${{ inputs.run-tests }}
        run: dotnet test ${{ inputs.test-path }} --no-restore -c Release

  docker-build-push:
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/stg' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: mohamedmagdy122/ecommerce-gitops
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops

      - name: Update image tag in staging values
        run: |
          cd gitops
          FILE="environments/stg/${{ inputs.image-name }}.yaml"
          sed -i "s/tag: .*/tag: sha-${{ github.sha }}/" $FILE
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add $FILE
          git commit -m "ci: update ${{ inputs.image-name }} staging tag to sha-${{ github.sha }}"
          git push

  deploy-production:
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: mohamedmagdy122/ecommerce-gitops
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops

      - name: Update image tag in production values
        run: |
          cd gitops
          FILE="environments/prod/${{ inputs.image-name }}.yaml"
          sed -i "s/tag: .*/tag: sha-${{ github.sha }}/" $FILE
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          git add $FILE
          git commit -m "ci: update ${{ inputs.image-name }} production tag to sha-${{ github.sha }}"
          git push
